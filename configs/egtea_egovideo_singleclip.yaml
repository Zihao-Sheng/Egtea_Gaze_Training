seed: 42
device: cuda
output_dir: outputs/egovideo_singleclip/partial
data:
  root: data/egtea_gaze_plus
  split_id: 1
  resize_size: 224
  crop_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  train_max_samples: 8299
  val_max_samples: 2022
model:
  name: egovideo_singleclip
  num_frames: 4
  pretrained_checkpoint: third_party/EgoVideo-main/backbone/ckpt_4frames.pth
  freeze_mode: partial
  trainable_blocks: 4
  classifier_dropout: 0.3
training:
  epochs: 8
  batch_size: 4
  num_workers: 0
  learning_rate: 0.0001
  weight_decay: 0.00005
  amp: true
  auto_scale_batch_size: true
